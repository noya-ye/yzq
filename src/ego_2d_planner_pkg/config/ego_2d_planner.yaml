ego_replan_fsm_2d_node:
  ros__parameters:
    frame_id: "lidar"
    cloud_topic: "/cloud_registered_filtered"
    odom_topic: "/fastlio2/lio_odom"
    goal_topic: "/simple_2d_planner/goal"

    grid_map/resolution: 0.05
    grid_map/map_size_x: 12.0
    grid_map/map_size_y: 12.0
    grid_map/cloud_min_z: -0.30
    grid_map/cloud_max_z: 2.20
    grid_map/inflate_radius: 0.45
    grid_map/occupied_threshold: 50

    # Persistent occupied cache.
    # Once a world-grid cell is observed as occupied continuously long enough,
    # it remains occupied during this node's lifetime and is used for planning.
    grid_map/persistent_cache_enable: true
    grid_map/persistent_confirm_s: 2.0
    grid_map/persistent_miss_tolerance_s: 0.35
    grid_map/persistent_min_observations: 3

    # EGO-style FSM params
    fsm/planning_rate: 10.0
    fsm/thresh_replan_time: 0.80
    fsm/thresh_replan_dist: 0.80
    fsm/thresh_no_replan_dist: 0.35
    fsm/target_reached_tol: 0.25
    fsm/emergency_time: 0.80
    fsm/max_fsm_plan_failures: 3

    search/astar_max_iter: 30000

    manager/control_points_distance: 0.25
    manager/bspline_sample_step: 0.05
    manager/collision_check_step: 0.05
    manager/fallback_to_raw_path: false   # EGO-style: never use raw path as normal success
    manager/hover_if_plan_failed: true
    manager/lookahead_dist: 0.35
    manager/fixed_z: 1.0

    optimization/enable: true
    optimization/max_iter: 100
    optimization/step_size: 0.035
    optimization/max_update: 0.05
    optimization/dist0: 0.45
    optimization/max_vel: 0.8
    optimization/max_acc: 0.8
    optimization/knot_span: 0.25
    optimization/lambda_smooth: 1.0
    optimization/lambda_collision: 3.0
    optimization/lambda_feasibility: 0.2
    optimization/lambda_fitness: 0.6

    # Rebound retries: each failed attempt becomes more obstacle-avoiding.
    optimization/max_rebound_attempts: 4
    optimization/retry_collision_scale: 1.6
    optimization/retry_smooth_scale: 0.75
    optimization/retry_dist0_scale: 1.08

traj_server_2d_node:
  ros__parameters:
    # True EGO-style 2D B-spline input. Do not subscribe selected_path here.
    bspline_topic: "/ego_2d_planner/bspline_2d"
    cmd_topic: "/position_cmd"
    frame_id: "lidar"

    # Evaluate B-spline by time, then publish quadrotor_msgs/PositionCommand.
    cmd_rate_hz: 50.0
    fixed_z: 1.0
    use_msg_z: true
    time_forward: 0.70
    yaw_dot_max: 3.1415926
    hold_after_finish: true

    pos_gain_x: 0.0
    pos_gain_y: 0.0
    pos_gain_z: 0.0
    vel_gain_x: 0.0
    vel_gain_y: 0.0
    vel_gain_z: 0.0
